services:
  - type: web
    name: pcfix-backend
    runtime: node
    plan: free
    rootDir: outputs/production/no-npm-backend
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true

  - type: static
    name: pcfix-sistema
    rootDir: outputs
    buildCommand: ""
    staticPublishPath: .
